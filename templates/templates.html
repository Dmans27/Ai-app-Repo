<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="container" style="max-width:520px; margin:60px auto; padding:20px;">
    <h1 style="margin:0 0 12px 0;">CMS Login</h1>

    {% if error %}
      <div class="divide" style="padding:12px; margin:12px 0; border:1px solid rgba(239,68,68,.5);">
        {{ error }}
      </div>
    {% endif %}

    <form method="post" class="divide" style="padding:16px; display:grid; gap:12px;">
      <label>
        <div style="opacity:.85; margin-bottom:6px;">Email</div>
        <input name="email" type="email" required style="width:100%; padding:10px 12px; border-radius:10px;">
      </label>

      <label>
        <div style="opacity:.85; margin-bottom:6px;">Password</div>
        <input name="password" type="password" required style="width:100%; padding:10px 12px; border-radius:10px;">
      </label>

      <button class="btn" type="submit">Login</button>
    </form>
  </div>
</body>
</html>
