<!doctype html>
<html>
<head>
  <title>Create User</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>

<div class="container" style="max-width:600px; margin:40px auto;">

  <h1>Create User</h1>

  {% if error %}
    <div class="divide">{{ error }}</div>
  {% endif %}

  <form method="post" class="divide" style="padding:16px;">

    <label>Email</label>
    <input name="email" type="email" required style="width:100%; padding:10px;">

    <label>Password</label>
    <input name="password" type="password" required style="width:100%; padding:10px;">

    <label>
      <input type="checkbox" name="is_admin">
      Admin user
    </label>

    <br><br>

    <button class="btn" type="submit">
      Create User
    </button>

  </form>

</div>

</body>
</html>
