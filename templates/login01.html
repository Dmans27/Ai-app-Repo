<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <div class="container" style="max-width:520px; margin:80px auto;">

    <h1 style="text-align:center; margin-bottom:18px;">CMS Login</h1>

    {% if error %}
      <div style="margin:12px 0; padding:12px; border:1px solid rgba(239,68,68,.5); border-radius:10px;">
        {{ error }}
      </div>
    {% endif %}

    <!-- ✅ LOGIN FORM (posts to /login) -->
    <form method="post" action="{{ url_for('login') }}" style="display:grid; gap:12px;">
      <label>
        <div style="margin-bottom:6px; opacity:.8;">Email</div>
        <input name="email" type="email" required style="width:100%; padding:10px 12px; border-radius:10px;">
      </label>

      <label>
        <div style="margin-bottom:6px; opacity:.8;">Password</div>
        <input name="password" type="password" required style="width:100%; padding:10px 12px; border-radius:10px;">
      </label>

      <button class="btn" type="submit" style="width:100%;">Login</button>
    </form>

    <div style="text-align:center; margin-top:18px;">
      <span style="opacity:.7;">No account?</span><br><br>

      <!-- ✅ CREATE USER BUTTON (goes to /create-user GET page) -->
      <a href="{{ url_for('signup') }}"
         class="btn"
         style="display:inline-block; background:#16a34a; color:white; padding:10px 18px; border-radius:8px; text-decoration:none;">
        Create User Account
      </a>
    </div>

    <div style="text-align:center; margin-top:18px;">
      {% if session.get("user_id") %}
        <a href="{{ url_for('admin_home') }}">Admin</a> •
        <a href="{{ url_for('logout') }}">Logout</a>
      {% else %}
        <a href="{{ url_for('login') }}">Login</a>
      {% endif %}
    </div>

  </div>
</body>
</html>
